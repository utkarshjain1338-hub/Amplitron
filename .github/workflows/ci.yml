name: CI - Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [develop]

jobs:
  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake \
          libportaudio2 portaudio19-dev \
          libsdl2-dev libgl1-mesa-dev libglu1-mesa-dev

    - name: Setup ImGui
      run: git clone --depth 1 --branch v1.90.1 https://github.com/ocornut/imgui.git external/imgui

    - name: Setup NanoSVG
      run: |
        curl -sL -o external/nanosvg.h https://raw.githubusercontent.com/memononen/nanosvg/master/src/nanosvg.h
        curl -sL -o external/nanosvgrast.h https://raw.githubusercontent.com/memononen/nanosvg/master/src/nanosvgrast.h

    - name: Build
      run: |
        mkdir -p build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(nproc)

    - name: Run Tests
      run: cd build && ./amplitron-tests

    - name: Upload Build
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v7
      with:
        name: linux-build
        path: build/guitar-amp
        retention-days: 1

  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install Dependencies
      run: brew install portaudio sdl2

    - name: Setup ImGui
      run: git clone --depth 1 --branch v1.90.1 https://github.com/ocornut/imgui.git external/imgui

    - name: Setup NanoSVG
      run: |
        curl -sL -o external/nanosvg.h https://raw.githubusercontent.com/memononen/nanosvg/master/src/nanosvg.h
        curl -sL -o external/nanosvgrast.h https://raw.githubusercontent.com/memononen/nanosvg/master/src/nanosvgrast.h

    - name: Build
      run: |
        HOMEBREW_PREFIX=$(brew --prefix)
        mkdir -p build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release \
          -DPORTAUDIO_INCLUDE_DIRS="$HOMEBREW_PREFIX/include" \
          -DPORTAUDIO_LIBRARIES="$HOMEBREW_PREFIX/lib/libportaudio.dylib" \
          -DSDL2_INCLUDE_DIRS="$HOMEBREW_PREFIX/include/SDL2" \
          -DSDL2_LIBRARIES="$HOMEBREW_PREFIX/lib/libSDL2.dylib" \
          ..
        make -j$(sysctl -n hw.ncpu)

    - name: Run Tests
      run: cd build && ./amplitron-tests

    - name: Bundle Dylibs
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        set -e
        mkdir -p staging
        cp build/guitar-amp staging/

        echo "=== Original linked libraries ==="
        otool -L staging/guitar-amp

        # Step 1: Find all non-system dylibs the binary links to (file-based, no pipe subshell)
        otool -L staging/guitar-amp | tail -n +2 | awk '{print $1}' > /tmp/deps.txt
        cat /tmp/deps.txt

        # Step 2: Copy each non-system dylib and fix the reference in the binary
        while IFS= read -r lib; do
          case "$lib" in
            /usr/lib/*|/System/*|@executable_path/*|@rpath/*|@loader_path/*) continue ;;
          esac
          libname=$(basename "$lib")
          echo ">>> Bundling: $lib -> staging/$libname"
          cp -L "$lib" "staging/$libname"
          chmod 644 "staging/$libname"
          echo ">>> Fixing reference: $lib -> @executable_path/$libname"
          install_name_tool -change "$lib" "@executable_path/$libname" staging/guitar-amp
        done < /tmp/deps.txt

        # Step 3: For each bundled dylib, fix ITS non-system dependencies too
        for dylib in staging/*.dylib; do
          [ -f "$dylib" ] || continue
          libname=$(basename "$dylib")
          echo ">>> Fixing dylib id: $libname"
          install_name_tool -id "@executable_path/$libname" "$dylib"

          otool -L "$dylib" | tail -n +2 | awk '{print $1}' > /tmp/subdeps.txt
          while IFS= read -r lib; do
            case "$lib" in
              /usr/lib/*|/System/*|@executable_path/*|@rpath/*|@loader_path/*) continue ;;
            esac
            depname=$(basename "$lib")
            echo ">>> Fixing sub-dep in $libname: $lib -> @executable_path/$depname"
            if [ ! -f "staging/$depname" ]; then
              cp -L "$lib" "staging/$depname"
              chmod 644 "staging/$depname"
              install_name_tool -id "@executable_path/$depname" "staging/$depname"
            fi
            install_name_tool -change "$lib" "@executable_path/$depname" "$dylib"
          done < /tmp/subdeps.txt
        done

        echo ""
        echo "=== After bundling ==="
        otool -L staging/guitar-amp
        echo "=== Dylib links ==="
        for f in staging/*.dylib; do
          [ -f "$f" ] || continue
          echo "--- $(basename $f) ---"
          otool -L "$f"
        done
        echo "=== Staged files ==="
        ls -la staging/

    - name: Upload Build
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v7
      with:
        name: macos-build
        path: staging/
        retention-days: 1

  build-web:
    name: Build Web Demo (Emscripten)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.51
        actions-cache-folder: emsdk-cache

    - name: Cache Emscripten ports & system libs
      uses: actions/cache@v4
      with:
        path: ~/.emscripten_cache
        key: emsdk-cache-3.1.51-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          emsdk-cache-3.1.51-${{ runner.os }}-

    - name: Setup External Dependencies
      run: |
        git clone --depth 1 --branch v1.90.1 https://github.com/ocornut/imgui.git external/imgui &
        curl -sL -o external/nanosvg.h https://raw.githubusercontent.com/memononen/nanosvg/master/src/nanosvg.h &
        curl -sL -o external/nanosvgrast.h https://raw.githubusercontent.com/memononen/nanosvg/master/src/nanosvgrast.h &
        wait

    - name: Build WASM
      run: |
        mkdir -p build-web && cd build-web
        emcmake cmake -DCMAKE_BUILD_TYPE=Release ..
        emmake make -j$(nproc)

    - name: Upload Web Build
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v7
      with:
        name: web-build
        path: |
          build-web/index.html
          build-web/index.js
          build-web/index.wasm
          build-web/index.worker.js
          build-web/index.ww.js
          build-web/coi-serviceworker.js
          build-web/index.audio.worklet.js
        retention-days: 1

  test-windows:
    name: Test on Windows
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: false
        pacboy: >-
          gcc:p
          cmake:p
          portaudio:p
          SDL2:p
        install: make git

    - name: Setup External Dependencies
      shell: msys2 {0}
      run: |
        git clone --depth 1 --branch v1.90.1 https://github.com/ocornut/imgui.git external/imgui &
        curl -sL -o external/nanosvg.h https://raw.githubusercontent.com/memononen/nanosvg/master/src/nanosvg.h &
        curl -sL -o external/nanosvgrast.h https://raw.githubusercontent.com/memononen/nanosvg/master/src/nanosvgrast.h &
        wait

    - name: Build
      shell: msys2 {0}
      run: |
        mkdir -p build && cd build
        cmake -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release ..
        make -j$NUMBER_OF_PROCESSORS

    - name: Run Tests
      shell: msys2 {0}
      run: cd build && ./amplitron-tests.exe

    - name: Collect Binaries
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      shell: msys2 {0}
      run: |
        mkdir -p staging
        cp build/guitar-amp.exe staging/
        for dll in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll SDL2.dll; do
          cp /mingw64/bin/$dll staging/ 2>/dev/null || true
        done
        cp /mingw64/bin/libportaudio*.dll staging/ 2>/dev/null || true
        ls -la staging/

    - name: Upload Build
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v7
      with:
        name: windows-build
        path: staging/
        retention-days: 1
