name: CD - Release Build

on:
  workflow_run:
    workflows: ["CI - Build and Test"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  actions: read

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate Version
      id: version
      run: |
        COUNT=$(git rev-list --count HEAD)
        echo "version=0.1.${COUNT}" >> $GITHUB_OUTPUT
        echo "Release version: v0.1.${COUNT}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Amplitron v${{ steps.version.outputs.version }}
        body: |
          ## Amplitron v${{ steps.version.outputs.version }}

          ### Downloads
          | Platform | File | Type |
          |----------|------|------|
          | **Windows** 10/11 (64-bit) | `Amplitron-Windows-Setup.exe` | Installer |
          | **macOS** 10.15+ | `Amplitron-macOS.dmg` | Disk Image |
          | **Linux** x64 | `Amplitron-Linux-x64.tar.gz` | Archive |

          ### Installation
          - **Windows**: Run the `.exe` installer — includes Start Menu & Desktop shortcuts
          - **macOS**: Open the `.dmg`, drag Amplitron to Applications
          - **Linux**: Extract the archive, run `./amplitron.sh`

          **Website**: https://sudip-mondal-2002.github.io/Amplitron/
          **Contact**: sudmondal2002@gmail.com

  package-windows:
    name: Package Windows Installer
    needs: create-release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download Windows Build
      uses: actions/download-artifact@v4
      with:
        name: windows-build
        path: artifacts/windows
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install NSIS
      run: sudo apt-get update && sudo apt-get install -y nsis

    - name: Prepare Files
      run: |
        mkdir -p staging
        cp artifacts/windows/guitar-amp.exe staging/Amplitron.exe
        cp artifacts/windows/*.dll staging/ 2>/dev/null || true
        cp README.md staging/
        cp -r assets staging/ || true
        ls -la staging/

    - name: Build Installer
      run: |
        makensis "-DSRCDIR=$(pwd)/staging" "-DOUTFILE=$(pwd)/Amplitron-Windows-Setup.exe" scripts/installer.nsi

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.create-release.outputs.version }}
        files: Amplitron-Windows-Setup.exe

  package-macos:
    name: Package macOS DMG
    needs: create-release
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download macOS Build
      uses: actions/download-artifact@v4
      with:
        name: macos-build
        path: artifacts/macos
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Create App Bundle
      run: |
        mkdir -p Amplitron.app/Contents/MacOS
        mkdir -p Amplitron.app/Contents/Resources
        cp artifacts/macos/guitar-amp Amplitron.app/Contents/MacOS/Amplitron
        chmod +x Amplitron.app/Contents/MacOS/Amplitron
        cp -r assets Amplitron.app/Contents/MacOS/assets || true
        cp -r assets Amplitron.app/Contents/Resources/ || true
        VERSION="${{ needs.create-release.outputs.version }}"
        cat > Amplitron.app/Contents/Info.plist <<PLIST
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>CFBundleExecutable</key><string>Amplitron</string>
          <key>CFBundleIdentifier</key><string>com.amplitron.app</string>
          <key>CFBundleName</key><string>Amplitron</string>
          <key>CFBundleVersion</key><string>${VERSION}</string>
          <key>CFBundleShortVersionString</key><string>${VERSION}</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>CFBundleIconFile</key><string>icon</string>
          <key>NSHighResolutionCapable</key><true/>
          <key>NSMicrophoneUsageDescription</key><string>Amplitron needs microphone access for guitar input.</string>
        </dict>
        </plist>
        PLIST

    - name: Ad-hoc Codesign
      run: codesign --force --deep --sign - Amplitron.app

    - name: Create DMG
      run: |
        mkdir -p dmg_staging
        cp -r Amplitron.app dmg_staging/
        ln -s /Applications dmg_staging/Applications
        hdiutil create -volname "Amplitron" -srcfolder dmg_staging -ov -format UDZO Amplitron-macOS.dmg

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.create-release.outputs.version }}
        files: Amplitron-macOS.dmg

  package-linux:
    name: Package Linux Archive
    needs: create-release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download Linux Build
      uses: actions/download-artifact@v4
      with:
        name: linux-build
        path: artifacts/linux
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Package
      run: |
        mkdir -p Amplitron-Linux
        cp artifacts/linux/guitar-amp Amplitron-Linux/amplitron
        chmod +x Amplitron-Linux/amplitron
        cp README.md Amplitron-Linux/
        cp -r assets Amplitron-Linux/ || true
        printf '#!/bin/bash\ncd "$(dirname "$0")"\n./amplitron\n' > Amplitron-Linux/amplitron.sh
        chmod +x Amplitron-Linux/amplitron.sh
        tar -czf Amplitron-Linux-x64.tar.gz Amplitron-Linux

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.create-release.outputs.version }}
        files: Amplitron-Linux-x64.tar.gz

  deploy-website:
    name: Deploy Download Page
    needs: [create-release, package-windows, package-macos, package-linux]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        publish_branch: gh-pages
